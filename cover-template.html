<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>题图</title>
<style>
  /* WeChat 主封面 2.35:1 — 900x383 */
  :root {
    --bg-from: #1a1a2e;
    --bg-to:   #16213e;
    --accent:  #e94560;
    --ink:     #ffffff;
    --muted:   rgba(255,255,255,0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 900px;
    height: 383px;
    overflow: hidden;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                 "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #fff;
    -webkit-font-smoothing: antialiased;
  }

  .cover {
    width: 900px;
    height: 383px;
    position: relative;
    background:
      radial-gradient(circle at 80% 20%, rgba(233,69,96,0.18) 0%, transparent 50%),
      linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
    color: var(--ink);
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .accent-bar {
    width: 56px;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    margin-bottom: 28px;
  }

  .title {
    font-size: 52px;
    line-height: 1.25;
    font-weight: 700;
    letter-spacing: -0.5px;
    max-width: 720px;
    /* Auto-shrink: long titles get smaller via JS below */
  }

  .title.long  { font-size: 44px; }
  .title.xlong { font-size: 36px; line-height: 1.3; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    color: var(--muted);
    font-size: 18px;
    letter-spacing: 0.5px;
  }

  .subtitle { max-width: 600px; }
  .author {
    font-size: 16px;
    text-align: right;
    white-space: nowrap;
  }

  /* Decorative dots (top-right) */
  .dots {
    position: absolute;
    top: 36px;
    right: 64px;
    display: grid;
    grid-template-columns: repeat(5, 6px);
    gap: 10px;
    opacity: 0.3;
  }
  .dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink);
  }
</style>
</head>
<body>
<div class="cover">
  <div class="dots">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div>
    <div class="accent-bar"></div>
    <h1 class="title" id="title">在此填写标题</h1>
  </div>

  <div class="meta-row">
    <div class="subtitle" id="subtitle"></div>
    <div class="author" id="author"></div>
  </div>
</div>

<script>
  // Read params from URL: ?title=...&subtitle=...&author=...
  const params = new URLSearchParams(location.search);
  const title    = params.get('title')    || '在此填写标题';
  const subtitle = params.get('subtitle') || '';
  const author   = params.get('author')   || '';

  const titleEl    = document.getElementById('title');
  const subtitleEl = document.getElementById('subtitle');
  const authorEl   = document.getElementById('author');

  titleEl.textContent    = title;
  subtitleEl.textContent = subtitle;
  authorEl.textContent   = author;

  // Auto-shrink long titles
  // Chinese chars count as 2, ASCII as 1 (rough heuristic)
  const visualLen = [...title].reduce(
    (n, c) => n + (/[一-龥]/.test(c) ? 2 : 1), 0
  );
  if (visualLen > 32 && visualLen <= 48) titleEl.classList.add('long');
  else if (visualLen > 48)               titleEl.classList.add('xlong');
</script>
</body>
</html>
